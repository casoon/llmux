# llmux Beispiel-Konfiguration (dynamischer, tier-basierter Router)
#
# llmux ist eine lokale Governance-/Policy-Schicht: jeder Request wird entlang
# expliziter Dimensionen entschieden — privacy (block_cloud_patterns -> local_only),
# capability (Tools/Kontext), quality (min_tier), cost (budgets/pressure_downgrade)
# und override (x-llmux-model). Das Ergebnis wird je Request als Policy-Label
# geloggt und über GET /api/stats/policy ausgewertet. Erzwungene Overrides umgehen
# die harten Sicherheits-/Fähigkeitsbedingungen nicht (siehe README "Routing Policy").
server:
  host: "0.0.0.0"
  port: 3456

auth:
  llmux_key: "mp_dev_changeme"   # leer = keine Auth (nur lokal!)

budgets:
  daily_max_usd: 2.00
  monthly_max_usd: 30.00
  # Mit steigender Budgetauslastung wird die erlaubte Tier-Obergrenze gesenkt
  # (graceful downgrade). Die restriktivste zutreffende Regel gewinnt.
  pressure_downgrade:
    - { at: 0.50, max_tier: 4 }   # ab 50 % Auslastung kein Top-Tier mehr
    - { at: 0.80, max_tier: 2 }   # ab 80 % nur noch günstige Modelle
    - { at: 0.95, max_tier: 1 }   # ab 95 % nur noch lokal/free

# Routing-Profil (#30): balanced (Default, günstigstes gültiges Modell), interactive
# (niedrigste erwartete p50-Latenz aus den Logs zuerst) oder batch. Pro Request via
# Header x-llmux-profile überschreibbar. Harte Filter/Budget gewinnen immer.
routing:
  default_profile: balanced

# Smart Retry: transiente Fehler (5xx/429/Netzwerk) -> gleiches Modell mit Backoff;
# 401/402/403 -> nächstes Modell; sonstige 4xx -> Abbruch ohne Fallback.
retry:
  max_retries: 2
  backoff_initial_ms: 500
  backoff_max_ms: 8000

# Exact-Match-Antwort-Cache (kein Embedding). Identische Requests an dasselbe Modell
# kommen aus SQLite (Kosten 0). Opt-out pro Request via Header x-llmux-no-cache.
cache:
  enabled: true
  ttl_seconds: 1800
  max_conversation_messages: 3
  # Hintergrund-Eviction: abgelaufene Einträge werden alle N Sekunden gelöscht.
  eviction_interval_seconds: 300
  # Optionales Zeilenlimit; älteste Einträge fallen zuerst raus. Weglassen = unbegrenzt.
  max_entries: 10000

privacy:
  local_first: true
  # Wird ein Pattern erkannt -> task_type private_sensitive (-> nur lokale Provider).
  # Gescannt werden User-/Tool-Message-Content UND die Tool-/Function-Schemas.
  block_cloud_patterns:
    - ".env"
    - "PRIVATE_KEY"
    - "API_KEY"
    - "BEGIN RSA"
    - "password"
    - "secret"
  # Auch statisch injizierten system-/assistant-Content scannen. Standard false:
  # dieser Kontext ist Client-Boilerplate, kein User-Payload, und würde sonst
  # spurious local_only erzwingen (#23).
  scan_system: false

# Regelbasierte Klassifikation: task_type wird nur aus den letzten user-Messages
# bestimmt, nicht aus dem großen statischen Prefix der Agent-Clients (#22).
classifier:
  user_messages: 1

providers:
  openrouter:
    enabled: true
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    # Alternativ mehrere Keys mit Gewicht + optionalem Modellfilter (statt api_key_env).
    # Gewichtet-zufällige Auswahl; bei 401/402/403/429 Rotation zum nächsten Key.
    # keys:
    #   - { env: "OPENROUTER_KEY_A", weight: 3.0 }
    #   - { env: "OPENROUTER_KEY_B", weight: 1.0, allow: ["anthropic/claude-3-opus"] }
  openai:
    enabled: true
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
  ollama:
    enabled: true
    base_url: "http://localhost:11434/v1"
    api_key_env: null
    local: true
    # Vom Provider nicht unterstützte Felder werden vor dem Senden entfernt.
    strip_params: ["frequency_penalty", "presence_penalty", "logit_bias"]
  # Nativer Anthropic-Provider (kind: anthropic) — spricht /v1/messages direkt,
  # statt über einen OpenAI-kompatiblen Zwischenschritt. Auth via x-api-key.
  anthropic:
    enabled: false
    kind: anthropic
    base_url: "https://api.anthropic.com/v1"
    api_key_env: "ANTHROPIC_API_KEY"
    # Provider cached wiederholte Prompt-Prefixe -> die Routing-Kostenschätzung
    # rabattiert den großen statischen Prefix (#24). Reale Abrechnung unverändert.
    prompt_caching: true
    cache_billed_fraction: 0.1   # gecachter Prefix ~10 % (Anthropic Cache-Read)

# Modell-Katalog: der Selektor wählt daraus dynamisch das günstigste Modell,
# das Tier-Floor, Tool-Bedarf, Kontextgröße, Privacy und Budget erfüllt.
# tier: 1 = billig/lokal … 5 = Top-Reasoning. Preise in USD pro 1 Mio Tokens.
# capabilities (#31): bekannte Namen sind tools, json_schema, vision, streaming,
# streaming_usage, large_context, reasoning, strict_tool_schema. supports_tools: true
# ist Sugar für die tools-Capability. tools/json_schema/vision werden aus dem Request
# automatisch als Pflicht-Anforderung erkannt; Task-Regeln können weitere via
# require_capabilities verlangen. Unbekannte Namen werden beim Start abgewiesen.
models:
  - { provider: ollama, model: "qwen2.5", tier: 1, context: 32000, supports_tools: false, input_per_mtok: 0.0, output_per_mtok: 0.0 }
  - { provider: ollama, model: "deepseek-coder", tier: 2, context: 16000, supports_tools: false, input_per_mtok: 0.0, output_per_mtok: 0.0 }
  - { provider: openrouter, model: "meta-llama/llama-3.1-8b-instruct:free", tier: 1, context: 128000, supports_tools: true, input_per_mtok: 0.0, output_per_mtok: 0.0 }
  - { provider: openrouter, model: "google/gemini-flash-1.5", tier: 2, context: 1000000, supports_tools: true, capabilities: ["json_schema", "vision", "large_context"], input_per_mtok: 0.075, output_per_mtok: 0.30 }
  - { provider: openai, model: "gpt-4.1-mini", tier: 3, context: 128000, supports_tools: true, capabilities: ["json_schema", "vision"], input_per_mtok: 0.40, output_per_mtok: 1.60 }
  - { provider: openrouter, model: "anthropic/claude-3.5-sonnet", tier: 4, context: 200000, supports_tools: true, capabilities: ["json_schema", "vision"], input_per_mtok: 3.00, output_per_mtok: 15.00 }
  - { provider: openrouter, model: "google/gemini-pro-1.5", tier: 4, context: 2000000, supports_tools: true, capabilities: ["json_schema", "vision", "large_context"], input_per_mtok: 1.25, output_per_mtok: 5.00 }
  - { provider: openrouter, model: "anthropic/claude-3-opus", tier: 5, context: 200000, supports_tools: true, capabilities: ["vision"], input_per_mtok: 15.00, output_per_mtok: 75.00 }

# task_type -> Anforderung. min_tier = Qualitäts-Floor; require_tools/local_only =
# harte Bedingungen; expected_output_ratio steuert Kostenschätzung & Ranking.
# Logische Modell-Aliase: greifen auf x-llmux-model und das model-Feld des Requests.
# Ein passender Alias erzwingt das Zielmodell (sonst dynamische Auswahl).
aliases:
  fast: "google/gemini-flash-1.5"
  best: "anthropic/claude-3-opus"
  cheap: "meta-llama/llama-3.1-8b-instruct:free"

# Projekt-Scopes (#33): pro Projekt zusätzliche Routing-Regeln, aufgelöst über den
# x-llmux-project-Header. Werden vor der Auswahl mit der Task-Policy verschmolzen;
# erzwungene Overrides (x-llmux-model) umgehen sie nicht. Ohne Header: Default.
projects:
  client-api:
    local_only: true               # sensible Kundendaten nie in die Cloud
  checkout:
    min_tier: 3                     # kritisches Projekt -> mindestens Tier 3
  docs:
    forbid_providers: ["openai"]    # nur günstige/lokale Backends für Doku

classification:
  simple_text:       { min_tier: 1, expected_output_ratio: 0.5 }
  summarize:         { min_tier: 1, expected_output_ratio: 0.3 }
  code_review:       { min_tier: 3, expected_output_ratio: 1.0 }
  architecture:      { min_tier: 4, expected_output_ratio: 1.5 }
  private_sensitive: { min_tier: 1, local_only: true, expected_output_ratio: 1.0 }
